name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
  # Also allows you to trigger a build manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image as both :latest and :<git-sha> so you can
          # roll back to any previous version if needed
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/colorcraft-studio:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/colorcraft-studio:${{ github.sha }}
          # Caches layers between builds so rebuilds are fast
          cache-from: type=gha
          cache-to: type=gha,mode=max
