version: "3.8"

services:
  colorcraft:
    image: ghcr.io/bangsmackpow/colorcraft-studio:latest
    container_name: colorcraft-studio
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - APP_NAME=${APP_NAME:-ColorCraft Studio}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/convert"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
